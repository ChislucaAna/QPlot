<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plotter</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <!-- Plotting Section -->
    <div class="flex justify-center mt-4">
        <div class="plot-container w-1/2 bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-xl font-semibold mb-2">Plot</h2>
            {% if plot_url %}
                <img class="max-w-full h-auto" src="data:image/png;base64,{{ plot_url }}" alt="Point Plot">
            {% else %}
                <p class="text-gray-500">No plot available. Add elements and click "Plot" to generate one.</p>
            {% endif %}
        </div>
    </div>

    <!-- Plot Button -->
    <div class="flex justify-center mt-4">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" name="plot" class="bg-green-500 text-white py-2 px-4 rounded hover:bg-green-600">Plot</button>
        </form>
    </div>

    <!-- Forms -->
    {% include 'plotter_sections/points.html' %}
</body>

<style>
    body {
        background-image: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%);
    }
</style>
</html>
